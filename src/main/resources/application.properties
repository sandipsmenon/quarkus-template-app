# =============================================================================
# Application
# =============================================================================
quarkus.application.name=quarkus-template-app
quarkus.application.version=1.0.0

# =============================================================================
# HTTP
# =============================================================================
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept

# =============================================================================
# Database (PostgreSQL) — override via environment variables in production
# =============================================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/quarkus_template}

# Connection pool
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10

# Schema management
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.format-sql=true

# =============================================================================
# External REST Client
# =============================================================================
quarkus.rest-client."com.template.quarkus.client.JsonPlaceholderClient".url=${JSONPLACEHOLDER_URL:https://jsonplaceholder.typicode.com}
quarkus.rest-client."com.template.quarkus.client.JsonPlaceholderClient".connect-timeout=5000
quarkus.rest-client."com.template.quarkus.client.JsonPlaceholderClient".read-timeout=10000

# =============================================================================
# OpenAPI / Swagger UI
# =============================================================================
quarkus.smallrye-openapi.info-title=Quarkus Template API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Production-quality Quarkus reference template API
quarkus.smallrye-openapi.info-contact-name=Template Support
quarkus.smallrye-openapi.info-contact-email=support@template.com
quarkus.smallrye-openapi.info-license-name=Apache 2.0
quarkus.smallrye-openapi.info-license-url=https://www.apache.org/licenses/LICENSE-2.0

quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.title=Quarkus Template API

# =============================================================================
# Health checks
# =============================================================================
quarkus.smallrye-health.ui.always-include=true

# =============================================================================
# Logging
# =============================================================================
quarkus.log.console.enable=true
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.console.level=INFO
quarkus.log.category."com.template.quarkus".level=DEBUG

# =============================================================================
# Dev profile overrides
# =============================================================================
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.log.console.level=DEBUG

# =============================================================================
# Test profile overrides
# =============================================================================
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.rest-client."com.template.quarkus.client.JsonPlaceholderClient".url=http://localhost:8089
